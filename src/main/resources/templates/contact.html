<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Hope Bridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <h1 class="display-4 fw-bold text-center mb-5" style="color: #6A0DAD;">Contact Us</h1>

                <div class="row mb-5">
                    <div class="col-md-4 mb-3">
                        <div class="text-center">
                            <i class="fas fa-envelope fa-2x mb-3" style="color: #6A0DAD;"></i>
                            <h5>Email</h5>
                            <p><a href="mailto:info@hopebridge.org" class="text-decoration-none">info@hopebridge.org</a></p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="text-center">
                            <i class="fas fa-phone fa-2x mb-3" style="color: #6A0DAD;"></i>
                            <h5>Phone</h5>
                            <p><a href="tel:+15551234567" class="text-decoration-none">+1 (555) 123-4567</a></p>
                        </div>
                    </div>
                    <div class="col-md-4 mb-3">
                        <div class="text-center">
                            <i class="fas fa-map-marker-alt fa-2x mb-3" style="color: #6A0DAD;"></i>
                            <h5>Address</h5>
                            <p>123 Charity Lane, New York, NY 10001</p>
                        </div>
                    </div>
                </div>

                <div class="card shadow-lg border-0 mb-5">
                    <div class="card-body p-5">
                        <h3 class="fw-bold mb-4">Send Us a Message</h3>
                        <form method="post">
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label for="name" class="form-label">Your Name</label>
                                    <input type="text" class="form-control" id="name" name="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label for="email" class="form-label">Email Address</label>
                                    <input type="email" class="form-control" id="email" name="email" required>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label for="subject" class="form-label">Subject</label>
                                <input type="text" class="form-control" id="subject" name="subject" required>
                            </div>

                            <div class="mb-3">
                                <label for="message" class="form-label">Message</label>
                                <textarea class="form-control" id="message" name="message" rows="5" required></textarea>
                            </div>

                            <button type="submit" class="btn btn-primary btn-lg fw-bold">
                                <i class="fas fa-paper-plane"></i> Send Message
                            </button>
                        </form>
                    </div>
                </div>

                <div class="alert alert-info">
                    <i class="fas fa-info-circle"></i>
                    <strong>Note:</strong> This is a demonstration contact form. Messages are not stored in the demo version.
                </div>
            </div>
        </div>
    </div>

    <div th:replace="fragments/footer"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
