# Server Configuration
server.port=${PORT:8080}
server.servlet.context-path=/
spring.application.name=Hope Bridge NGO Management System

# MySQL Database Configuration
spring.datasource.url=jdbc:mysql://localhost:3306/new_hope_bridge
spring.datasource.username=root
spring.datasource.password=YOUR_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# Thymeleaf Configuration
spring.thymeleaf.cache=false
spring.thymeleaf.mode=HTML
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Logging Configuration
logging.level.root=INFO
logging.level.com.hopebridge=DEBUG
logging.level.org.springframework.security=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Session Configuration
server.servlet.session.timeout=30m
spring.session.store-type=none

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Application Custom Properties
app.name=Hope Bridge
app.version=1.0.0
app.organization=NGO Management System

# Error Configuration
server.error.whitelabel.enabled=true
server.error.include-message=always

