<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orphanage Admin Dashboard - Hope Bridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .dashboard-card {
            transition: 0.3s ease;
        }
        .dashboard-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(106,13,173,0.15);
        }
        .stat-icon {
            width: 50px;
                height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid main-content">
    <div class="row">
        <div class="col-lg-2 px-0">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </div>

        <div class="col-lg-10">
            <div class="d-flex align-items-center mb-4">
                <div class="me-3"
                     style="width:50px;height:50px;
                background:linear-gradient(135deg,#6A0DAD,#9B59B6);
                border-radius:12px;
                display:flex;
                align-items:center;
                justify-content:center;
                color:white;
                box-shadow:0 4px 15px rgba(106,13,173,0.3);">
                    <i class="fas fa-chart-column fa-lg"></i>
                </div>
                <div>
                    <h2 class="fw-bold mb-0" style="color:#6A0DAD;">Orphanage Dashboard</h2>
                    <small class="text-muted">Monitor donations, funds and donor activity</small>
                </div>
            </div>

            <!-- Essential Stats -->
            <div class="row g-3 mb-4">
                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h6>Available Funds</h6>
                            <h3 th:text="'₹' + ${orphanage.availableFunds != null ? #numbers.formatDecimal(orphanage.availableFunds,0,'COMMA',2,'POINT') : '0.00'}">₹0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h6>Required Funds</h6>
                            <h3 th:text="'₹' + ${orphanage.requiredFunds != null ? #numbers.formatDecimal(orphanage.requiredFunds,0,'COMMA',2,'POINT') : '0.00'}">₹0</h3>
                        </div>
                    </div>
                </div>

                <div class="col-md-4">
                    <div class="card shadow-sm">
                        <div class="card-body">
                            <h6>Total Donors</h6>
                            <h3 th:text="${totalDonors}">0</h3>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Small Donation Trend -->
            <div class="card shadow-sm mb-4">
                <div class="card-header">Recent Donation Trend</div>
                <div class="card-body">
                    <canvas id="dashboardChart" style="height:250px;"></canvas>
                </div>
            </div>

            <!-- Recent Donations -->
            <div class="card shadow-sm">
                <div class="card-header">Latest 5 Donations</div>
                <div class="table-responsive">
                    <table class="table">
                        <thead>
                        <tr>
                            <th>Donor</th>
                            <th>Amount</th>
                            <th>Date</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="donation : ${donations}">
                            <td th:text="${donation.donor != null and donation.donor.user != null ? donation.donor.user.fullName : 'Anonymous'}"></td>
                            <td th:text="'₹' + ${donation.amount}"></td>
                            <td th:text="${#temporals.format(donation.donationDate,'dd MMM yyyy')}"></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const labels = /*[[${chartLabels}]]*/ [];
    const amounts = /*[[${chartAmounts}]]*/ [];

    new Chart(document.getElementById('dashboardChart'), {
        type: 'bar',
        data: {
            labels: labels,
            datasets: [{
                label: 'Donations',
                data: amounts,
                backgroundColor: '#6A0DAD',
                borderColor: '#4B0082',
                borderWidth: 1,
                borderRadius: 6,
                barThickness: 35
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false
        }
    });
</script>
</body>
</html>
