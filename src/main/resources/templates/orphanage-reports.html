<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Orphanage Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        .chart-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .table-card {
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }

        .card-header {
            background: white;
            font-weight: 600;
            border-bottom: 1px solid #eee;
        }
    </style>
</head>
<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid main-content">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <h1 class="fw-bold mb-4" style="color: #6A0DAD;">
                <i class="fas fa-chart-pie me-2"></i> Donation Reports
            </h1>

            <!-- Charts Only -->
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <div class="card chart-card">
                        <div class="card-header">Donation Distribution</div>
                        <div class="card-body">
                            <canvas id="pieChart" height="300px"></canvas>
                        </div>
                    </div>
                </div>

                <div class="col-md-6">
                    <div class="card chart-card">
                        <div class="card-header">Donation Trend</div>
                        <div class="card-body">
                            <canvas id="lineChart" height="300px"></canvas>
                        </div>
                    </div>
                </div>
            </div>


            <!-- Recent Donation History -->
            <div class="card table-card">
                <div class="card-header d-flex justify-content-between align-items-center">
                    <span>Recent Donations</span>
                    <span class="badge bg-primary"
                          th:text="${#lists.size(recentDonations)} + ' entries'">0 entries</span>
                </div>

                <div class="table-responsive">
                    <table class="table table-hover mb-0">
                        <thead class="table-light">
                        <tr>
                            <th>Donor</th>
                            <th>Amount</th>
                            <th>Type</th>
                            <th>Date</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="donation : ${recentDonations}">
                            <td th:text="${donation.donorName}">John Doe</td>
                            <td class="fw-bold text-primary"
                                th:text="'₹' + ${#numbers.formatDecimal(donation.amount,0,'COMMA',2,'POINT')}">
                                ₹100
                            </td>
                            <td>
                                <span class="badge bg-success"
                                      th:text="${donation.donationType}">
                                    GENERAL
                                </span>
                            </td>
                            <td th:text="${#temporals.format(donation.donationDate,'MMM dd, yyyy')}">
                                Apr 03, 2026
                            </td>
                        </tr>

                        <tr th:if="${#lists.isEmpty(recentDonations)}">
                            <td colspan="4" class="text-center py-5">
                                <i class="fas fa-file-alt fa-3x text-muted mb-3"></i>
                                <h5>No Report Data Available</h5>
                            </td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>

        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script th:inline="javascript">
    const pieLabels = /*[[${pieLabels}]]*/ [];
    const pieData = /*[[${pieData}]]*/ [];
    const labels = /*[[${chartLabels}]]*/ [];
    const amounts = /*[[${chartAmounts}]]*/ [];

    new Chart(document.getElementById('pieChart'), {
        type: 'pie',
        data: {
            labels: pieLabels,
            datasets: [{
                data: pieData,
                backgroundColor: ["#6A0DAD","#3498DB","#F39C12","#2ECC71","#E74C3C","#1ABC9C","#5D6D7E","#FF6FB5"]
            }]
        },
        options: {
        responsive: true,
        maintainAspectRatio: false
    }
    });

    new Chart(document.getElementById('lineChart'), {
        type: 'line',
        data: {
            labels: labels,
            datasets: [{
                label: 'Donation Trend',
                data: amounts,
                borderColor: '#6A0DAD',
                fill: false,
                tension: 0.3
            }]
        },
        options: {
        responsive: true,
        maintainAspectRatio: false
    }
    });
</script>

</body>
</html>
