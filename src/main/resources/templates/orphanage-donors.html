<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donor Management - Hope Bridge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
<div th:replace="fragments/navbar :: navbar"></div>

<div class="container-fluid main-content">
    <div class="row">
        <div class="col-md-3 col-lg-2 p-0">
            <div th:replace="fragments/sidebar :: sidebar"></div>
        </div>

        <div class="col-md-9 col-lg-10 p-4">
            <h2 class="fw-bold mb-4" style="color: #6A0DAD;">
                <i class="fas fa-users"></i> Donor Management
            </h2>

            <div class="card shadow-sm">
                <div class="card-header bg-light d-flex justify-content-between align-items-center">
                    <h6 class="mb-0">All Donors</h6>
                    <span class="badge bg-primary"
                          th:text="${#lists.size(donors)} + ' Total'">0 Total</span>
                </div>

                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Donor ID</th>
                                <th>Name</th>
                                <th>Email</th>
                                <th>Phone</th>
                                <th>Total Donations</th>
                                <th>Status</th>
                            </tr>
                            </thead>

                            <tbody>
                            <tr th:each="donor : ${donors}">
                                <td th:text="${donor.id}">1</td>

                                <td th:text="${donor.user != null ? donor.user.fullName : 'N/A'}">
                                    John Doe
                                </td>

                                <td th:text="${donor.user != null ? donor.user.email : 'N/A'}">
                                    john@example.com
                                </td>

                                <td th:text="${donor.user != null ? donor.user.phone : 'N/A'}">
                                    9876543210
                                </td>

                                <td class="fw-bold" style="color: #6A0DAD;"
                                    th:text="'₹' + ${#numbers.formatDecimal(donor.totalDonations != null ? donor.totalDonations : 0,0,'COMMA',2,'POINT')}">
                                    ₹0.00
                                </td>

                                <td>
                                    <span th:if="${donor.user != null and donor.user.enabled}"
                                          class="badge bg-success">Active</span>
                                    <span th:unless="${donor.user != null and donor.user.enabled}"
                                          class="badge bg-danger">Inactive</span>
                                </td>
                            </tr>

                            <tr th:if="${#lists.isEmpty(donors)}">
                                <td colspan="7" class="text-center py-5">
                                    <i class="fas fa-users fa-3x text-muted mb-3"></i>
                                    <h5>No Donors Found</h5>
                                    <p class="text-muted">Donors will appear here once they register.</p>
                                </td>
                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
