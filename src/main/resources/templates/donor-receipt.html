<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Donation Receipt</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">
<div th:replace="fragments/navbar :: navbar"></div>
<div class="container py-5">
    <div class="card shadow-lg">
        <div class="card-body p-5">

            <div class="text-center">
                <h2 style="color:#6A0DAD;">Hope Bridge NGO</h2>
                <h4>Donation Receipt</h4>
                <hr>
            </div>

            <p><strong>Receipt No:</strong> <span th:text="${donation.receiptNumber}"></span></p>
            <p><strong>Date:</strong> <span th:text="${donation.donationDate}"></span></p>
            <p><strong>Donor Name:</strong> <span th:text="${donation.donor.user.fullName}"></span></p>
            <p><strong>PAN:</strong> <span th:text="${donation.panNumber}"></span></p>
            <p><strong>Amount:</strong> ₹ <span th:text="${donation.amount}"></span></p>
            <p><strong>Purpose:</strong> <span th:text="${donation.purpose}"></span></p>

            <div class="alert alert-success mt-4">
                Thank you for supporting orphan children ❤️
            </div>

            <button onclick="window.print()" class="btn btn-primary">
                Print Receipt
            </button>

        </div>
    </div>
</div>

</body>
</html>
